<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ইসলামিক প্রশ্ন ও উত্তর</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@400;600;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Serif Bengali', Arial, sans-serif;
    max-width: 750px;
    margin: 0 auto;
    padding: 30px 16px 60px;
    background: #f5f5f5;
  }

  .page-header {
    text-align: center;
    margin-bottom: 30px;
  }

  .page-header .icon {
    font-size: 40px;
    display: block;
    margin-bottom: 8px;
  }

  .page-header h1 {
    font-size: 22px;
    color: #1a5c38;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .page-header p {
    font-size: 13px;
    color: #777;
  }

  /* Category Filter */
  .filter-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 24px;
  }

  .filter-btn {
    padding: 6px 14px;
    border: 1.5px solid #1a5c38;
    border-radius: 20px;
    background: white;
    color: #1a5c38;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }

  .filter-btn:hover,
  .filter-btn.active {
    background: #1a5c38;
    color: white;
  }

  /* Search */
  .search-box {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    margin-bottom: 20px;
    outline: none;
    transition: border 0.2s;
    background: white;
  }

  .search-box:focus { border-color: #1a5c38; }

  /* Category Title */
  .category-title {
    font-size: 14px;
    font-weight: 700;
    color: #1a5c38;
    background: #e8f5ee;
    padding: 8px 16px;
    border-radius: 6px;
    margin: 20px 0 10px;
    border-left: 4px solid #1a5c38;
  }

  /* Accordion */
  .accordion-item {
    background: white;
    border: 1px solid #ddd;
    border-radius: 8px;
    margin-bottom: 8px;
    overflow: hidden;
  }

  .accordion-header {
    width: 100%;
    background: none;
    border: none;
    padding: 15px 18px;
    text-align: left;
    font-size: 14px;
    font-weight: 600;
    color: #333;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    transition: background 0.2s;
    font-family: inherit;
    line-height: 1.5;
  }

  .accordion-header:hover { background: #f0f0f0; }

  .accordion-header.active {
    background: #1a5c38;
    color: white;
  }

  .arrow {
    font-size: 11px;
    flex-shrink: 0;
    transition: transform 0.3s;
  }

  .accordion-header.active .arrow { transform: rotate(180deg); }

  .accordion-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease, padding 0.3s ease;
    padding: 0 18px;
    color: #555;
    line-height: 1.9;
    font-size: 13.5px;
  }

  .accordion-body.open {
    max-height: 400px;
    padding: 14px 18px;
  }

  /* Counter badge */
  .q-num {
    background: #1a5c38;
    color: white;
    font-size: 11px;
    padding: 2px 7px;
    border-radius: 10px;
    flex-shrink: 0;
    font-weight: 700;
  }

  .accordion-header.active .q-num {
    background: rgba(255,255,255,0.3);
  }

  .no-result {
    text-align: center;
    color: #999;
    padding: 30px;
    font-size: 14px;
  }

  @media (max-width: 480px) {
    .accordion-header { font-size: 13px; padding: 13px 14px; }
    .page-header h1 { font-size: 18px; }
  }
</style>
</head>
<body>

<div class="page-header">
  <span class="icon">☪️</span>
  <h1>ইসলামিক প্রশ্ন ও উত্তর</h1>
  <p>১০০টি গুরুত্বপূর্ণ ইসলামিক প্রশ্ন ও সহজ উত্তর</p>
</div>

<input class="search-box" type="text" placeholder="🔍 প্রশ্ন খুঁজুন..." id="searchInput" oninput="filterQA()">

<div class="filter-bar">
  <button class="filter-btn active" onclick="filterCat('all', this)">সব</button>
  <button class="filter-btn" onclick="filterCat('আকিদা', this)">আকিদা</button>
  <button class="filter-btn" onclick="filterCat('নামাজ', this)">নামাজ</button>
  <button class="filter-btn" onclick="filterCat('রোজা', this)">রোজা</button>
  <button class="filter-btn" onclick="filterCat('কুরআন', this)">কুরআন</button>
  <button class="filter-btn" onclick="filterCat('হাদিস', this)">হাদিস</button>
  <button class="filter-btn" onclick="filterCat('দোয়া', this)">দোয়া</button>
  <button class="filter-btn" onclick="filterCat('আখলাক', this)">আখলাক</button>
  <button class="filter-btn" onclick="filterCat('ইতিহাস', this)">ইতিহাস</button>
</div>

<div id="qaContainer"></div>

<script>
const qaData = [
  // আকিদা
  { cat: 'আকিদা', q: '১. ইসলামের অর্থ কী?', a: 'ইসলাম আরবি শব্দ। এর অর্থ আল্লাহর কাছে আত্মসমর্পণ করা, শান্তি ও আনুগত্য। যে ব্যক্তি আল্লাহর কাছে সম্পূর্ণরূপে নিজেকে সমর্পণ করে সেই মুসলিম।' },
  { cat: 'আকিদা', q: '২. ঈমানের মূল স্তম্ভ কয়টি ও কী কী?', a: 'ঈমানের মূল স্তম্ভ ৬টি। ১) আল্লাহর উপর বিশ্বাস, ২) ফেরেশতাদের উপর বিশ্বাস, ৩) কিতাবসমূহের উপর বিশ্বাস, ৪) নবী-রাসূলদের উপর বিশ্বাস, ৫) আখেরাতের উপর বিশ্বাস, ৬) ভাগ্যের ভালো-মন্দের উপর বিশ্বাস।' },
  { cat: 'আকিদা', q: '৩. ইসলামের পাঁচটি স্তম্ভ কী কী?', a: '১) কালিমা শাহাদাত, ২) নামাজ, ৩) রোজা, ৪) যাকাত, ৫) হজ্জ। এই পাঁচটি ইসলামের মূল ভিত্তি।' },
  { cat: 'আকিদা', q: '৪. তাওহিদ কাকে বলে?', a: 'তাওহিদ মানে আল্লাহর একত্ব বিশ্বাস করা। আল্লাহ এক ও অদ্বিতীয়, তাঁর কোনো শরিক নেই — এই বিশ্বাসকে তাওহিদ বলে।' },
  { cat: 'আকিদা', q: '৫. শিরক কী এবং কেন এটি মহাপাপ?', a: 'শিরক মানে আল্লাহর সাথে কাউকে শরিক করা। এটি ইসলামে সবচেয়ে বড় পাপ, কারণ আল্লাহ বলেছেন শিরককারীকে ক্ষমা করবেন না (সূরা নিসা: ৪৮)।' },
  { cat: 'আকিদা', q: '৬. কালিমা শাহাদাত কী?', a: '"লা ইলাহা ইল্লাল্লাহু মুহাম্মাদুর রাসূলুল্লাহ" — এটি হলো কালিমা শাহাদাত। এর অর্থ: আল্লাহ ছাড়া কোনো ইলাহ নেই এবং মুহাম্মদ (সা.) তাঁর রাসূল।' },
  { cat: 'আকিদা', q: '৭. আল্লাহর ৯৯টি নামকে কী বলা হয়?', a: 'আল্লাহর ৯৯টি নামকে "আসমাউল হুসনা" বলা হয় যার অর্থ সুন্দরতম নামসমূহ। হাদিসে বলা হয়েছে যে এগুলো মুখস্থ করলে জান্নাত পাওয়া যাবে।' },
  { cat: 'আকিদা', q: '৮. আখেরাত বলতে কী বোঝায়?', a: 'আখেরাত মানে পরকাল বা মৃত্যুর পরের জীবন। এতে রয়েছে কবরের জীবন, কিয়ামত, হিসাব-নিকাশ, জান্নাত ও জাহান্নাম।' },
  { cat: 'আকিদা', q: '৯. কিয়ামতের বড় আলামত কয়টি?', a: 'কিয়ামতের বড় আলামত ১০টি। এর মধ্যে রয়েছে দাজ্জালের আগমন, ঈসা (আ.)-এর অবতরণ, ইয়াজুজ-মাজুজের আগমন, সূর্য পশ্চিম দিক থেকে উদয় হওয়া ইত্যাদি।' },
  { cat: 'আকিদা', q: '১০. ফেরেশতারা কী দিয়ে তৈরি?', a: 'ফেরেশতারা নূর (আলো) দিয়ে তৈরি। তাঁরা আল্লাহর আদেশ পালন করেন এবং কখনো অবাধ্য হন না।' },

  // নামাজ
  { cat: 'নামাজ', q: '১১. দৈনিক কয় ওয়াক্ত নামাজ ফরজ?', a: 'দৈনিক পাঁচ ওয়াক্ত নামাজ ফরজ। ফজর, জোহর, আসর, মাগরিব ও এশা।' },
  { cat: 'নামাজ', q: '১২. নামাজের আগে কী করতে হয়?', a: 'নামাজের আগে অজু করতে হয়। অজু ছাড়া নামাজ হয় না। কাপড় ও শরীর পবিত্র এবং কিবলামুখী হতে হবে।' },
  { cat: 'নামাজ', q: '১৩. জুমার নামাজ কোন দিন ও কখন?', a: 'জুমার নামাজ প্রতি শুক্রবার জোহরের সময় আদায় করতে হয়। এটি পুরুষদের জন্য ফরজ। জুমার দিন সপ্তাহের শ্রেষ্ঠ দিন।' },
  { cat: 'নামাজ', q: '১৪. তাহাজ্জুদ নামাজ কখন পড়তে হয়?', a: 'তাহাজ্জুদ নামাজ রাতের শেষ তৃতীয়াংশে পড়া হয়। এটি নফল নামাজ তবে অত্যন্ত ফজিলতপূর্ণ। ফজরের আজানের আগ পর্যন্ত পড়া যায়।' },
  { cat: 'নামাজ', q: '১৫. নামাজে কিরাত পড়া ফরজ কি?', a: 'হ্যাঁ, নামাজে সূরা ফাতিহা পড়া ফরজ। হাদিসে বলা হয়েছে, "যে ব্যক্তি সূরা ফাতিহা পড়ল না, তার নামাজ হয়নি।"' },
  { cat: 'নামাজ', q: '১৬. সুন্নাত নামাজ কয় প্রকার?', a: 'সুন্নাত নামাজ দুই প্রকার। সুন্নাতে মুআক্কাদা (যা নবিজি সবসময় পড়তেন) এবং সুন্নাতে গায়রে মুআক্কাদা (যা মাঝে মাঝে পড়তেন)।' },
  { cat: 'নামাজ', q: '১৭. নামাজ ভঙ্গের কারণ কী কী?', a: 'নামাজ ভঙ্গ হয় যদি কথা বলা হয়, হাসা হয়, খাওয়া বা পান করা হয়, অজু ভাঙে, কিবলার দিক পরিবর্তন হয় বা বুকভরে কাশি দেওয়া হয়।' },
  { cat: 'নামাজ', q: '১৮. ঈদের নামাজ কখন আদায় হয়?', a: 'ঈদের নামাজ ঈদুল ফিতর ও ঈদুল আজহার দিন সূর্যোদয়ের পরে মাঠে বা মসজিদে আদায় করা হয়। এটি ওয়াজিব।' },
  { cat: 'নামাজ', q: '১৯. বিতর নামাজ কখন পড়তে হয়?', a: 'বিতর নামাজ এশার নামাজের পরে রাতে পড়তে হয়। এটি ওয়াজিব। ন্যূনতম এক রাকাত, তবে তিন রাকাত পড়া উত্তম।' },
  { cat: 'নামাজ', q: '২০. মসজিদে প্রবেশের দোয়া কী?', a: 'মসজিদে প্রবেশের সময় বলতে হয়: "আল্লাহুম্মাফ তাহলি আবওয়াবা রাহমাতিক।" অর্থ: হে আল্লাহ! আমার জন্য তোমার রহমতের দরজা খুলে দাও।' },

  // রোজা
  { cat: 'রোজা', q: '২১. রোজা কখন ফরজ হয়েছিল?', a: 'রমজান মাসের রোজা দ্বিতীয় হিজরিতে ফরজ হয়। সূরা বাকারার ১৮৩ নম্বর আয়াতে রোজার নির্দেশ দেওয়া হয়েছে।' },
  { cat: 'রোজা', q: '২২. রোজার নিয়ত রাতে করা কি জরুরি?', a: 'ফরজ রোজার জন্য রাতে নিয়ত করা জরুরি। তবে নফল রোজার নিয়ত দুপুরের আগে করা যায়। নিয়ত মুখে বলা শর্ত নয়, মনে মনে করলেই হয়।' },
  { cat: 'রোজা', q: '২৩. রোজা ভঙ্গের কারণ কী কী?', a: 'ইচ্ছাকৃতভাবে পানাহার করলে, স্ত্রী-সহবাস করলে বা ইচ্ছাকৃতভাবে বমি করলে রোজা ভেঙে যায়। এতে কাজা ও কাফফারা উভয়ই ওয়াজিব।' },
  { cat: 'রোজা', q: '২৪. রোজা মাকরুহ হওয়ার কারণ কী?', a: 'অহেতুক কোনো জিনিস চিবানো, রক্ত বের না হলেও মেসওয়াক করা ছাড়া দাঁত মাজা, মুখে পানি নিয়ে কুলি করার পর থুথু ফেলতে দেরি করা রোজা মাকরুহ করে।' },
  { cat: 'রোজা', q: '২৫. লাইলাতুল কদর কোন রাতে?', a: 'লাইলাতুল কদর রমজানের শেষ দশ দিনের বেজোড় রাতগুলোতে খুঁজতে বলা হয়েছে। বেশিরভাগ আলেমের মতে ২৭তম রাতে হওয়ার সম্ভাবনা বেশি। এটি হাজার মাসের চেয়ে উত্তম।' },
  { cat: 'রোজা', q: '২৬. তারাবির নামাজ কত রাকাত?', a: 'তারাবির নামাজ ২০ রাকাত। এটি রমজান মাসে এশার পরে পড়া হয়। এটি সুন্নাতে মুআক্কাদা।' },
  { cat: 'রোজা', q: '২৭. ইতিকাফ কী এবং কখন করতে হয়?', a: 'ইতিকাফ মানে মসজিদে ইবাদতের নিয়তে অবস্থান করা। রমজানের শেষ দশ দিন ইতিকাফ করা সুন্নাতে মুআক্কাদা।' },
  { cat: 'রোজা', q: '২৮. সাহরি না খেলে কি রোজা হবে?', a: 'হ্যাঁ, সাহরি না খেলেও রোজা হবে। সাহরি খাওয়া সুন্নাত, ফরজ নয়। তবে সাহরি খাওয়ায় বরকত রয়েছে বলে হাদিসে এসেছে।' },
  { cat: 'রোজা', q: '২৯. ইফতারের সুন্নাত খাবার কী?', a: 'খেজুর দিয়ে ইফতার করা সুন্নাত। খেজুর না পেলে পানি দিয়ে ইফতার করা সুন্নাত। নবিজি (সা.) সাধারণত খেজুর বা পানি দিয়ে ইফতার করতেন।' },
  { cat: 'রোজা', q: '৩০. কাফফারা কী?', a: 'রমজানে ইচ্ছাকৃতভাবে রোজা ভাঙলে কাফফারা দিতে হয়। কাফফারা হলো: একটানা ৬০টি রোজা রাখা বা ৬০ জন মিসকিনকে খাওয়ানো।' },

  // কুরআন
  { cat: 'কুরআন', q: '৩১. কুরআনে মোট কয়টি সূরা আছে?', a: 'কুরআনে মোট ১১৪টি সূরা আছে। সবচেয়ে বড় সূরা হলো সূরা বাকারা এবং সবচেয়ে ছোট সূরা হলো সূরা কাউসার।' },
  { cat: 'কুরআন', q: '৩২. কুরআনের প্রথম অবতীর্ণ আয়াত কোনটি?', a: 'কুরআনের প্রথম অবতীর্ণ আয়াত হলো সূরা আলাকের প্রথম পাঁচটি আয়াত ("ইকরা বিসমি রাব্বিকাল্লাজি খালাক...")। এটি হেরা গুহায় অবতীর্ণ হয়।' },
  { cat: 'কুরআন', q: '৩৩. কুরআন কতটি পারায় বিভক্ত?', a: 'কুরআন ৩০টি পারায় বিভক্ত। প্রতিটি পারাকে "জুয" বলা হয়। এটি সহজে তিলাওয়াত করার জন্য এভাবে ভাগ করা হয়েছে।' },
  { cat: 'কুরআন', q: '৩৪. কুরআনের সবচেয়ে বড় আয়াত কোনটি?', a: 'কুরআনের সবচেয়ে বড় আয়াত হলো সূরা বাকারার ২৮২ নম্বর আয়াত (আয়াতুদ-দাইন বা ঋণ সংক্রান্ত আয়াত)।' },
  { cat: 'কুরআন', q: '৩৫. আয়াতুল কুরসি কোন সূরায় আছে?', a: 'আয়াতুল কুরসি সূরা বাকারার ২৫৫ নম্বর আয়াত। এটি কুরআনের সবচেয়ে মর্যাদাসম্পন্ন আয়াত। প্রতিদিন পাঠ করলে রাতে শয়তান থেকে হেফাজত থাকা যায়।' },
  { cat: 'কুরআন', q: '৩৬. কুরআন কোন ভাষায় নাজিল হয়েছে?', a: 'কুরআন আরবি ভাষায় নাজিল হয়েছে। আল্লাহ বলেন, আমি এটি আরবি ভাষায় নাজিল করেছি যাতে তোমরা বুঝতে পারো (সূরা ইউসুফ: ২)।' },
  { cat: 'কুরআন', q: '৩৭. কুরআন মুখস্থ করলে কী বলা হয়?', a: 'কুরআন মুখস্থকারীকে "হাফেজ" বলা হয়। হাফেজের মাথায় কিয়ামতের দিন নূরের তাজ পরানো হবে এবং তার পরিবারের ৭০ জনকে ক্ষমা করা হবে।' },
  { cat: 'কুরআন', q: '৩৮. কুরআন তিলাওয়াতের সময় কী পড়তে হয়?', a: 'কুরআন তিলাওয়াতের শুরুতে "আউজুবিল্লাহি মিনাশ শায়তানির রাজিম" এবং "বিসমিল্লাহির রাহমানির রাহিম" পড়তে হয়।' },
  { cat: 'কুরআন', q: '৩৯. সূরা ইয়াসিনকে কী বলা হয়?', a: 'সূরা ইয়াসিনকে "কুরআনের হৃদয়" (কালবুল কুরআন) বলা হয়। রোগীর পাশে বা মৃত্যুর সময় এটি পাঠ করার বিষয়ে হাদিস রয়েছে।' },
  { cat: 'কুরআন', q: '৪০. কুরআনে কতটি সিজদার আয়াত আছে?', a: 'কুরআনে ১৪টি সিজদার আয়াত আছে। এই আয়াতগুলো পড়লে বা শুনলে সিজদা দেওয়া ওয়াজিব (হানাফি মতে) বা সুন্নাত।' },

  // হাদিস
  { cat: 'হাদিস', q: '৪১. হাদিস কাকে বলে?', a: 'নবী মুহাম্মদ (সা.)-এর কথা, কাজ ও অনুমোদনকে হাদিস বলে। হাদিস ইসলামের দ্বিতীয় মূল উৎস।' },
  { cat: 'হাদিস', q: '৪২. সহিহ হাদিস কাকে বলে?', a: 'যে হাদিসের সনদ (বর্ণনাকারীর শৃঙ্খল) বিচ্ছিন্নহীন এবং সকল রাবি বিশ্বস্ত ও স্মৃতিশক্তিসম্পন্ন সেটিকে সহিহ হাদিস বলে।' },
  { cat: 'হাদিস', q: '৪৩. সবচেয়ে বিশুদ্ধ হাদিসের কিতাব কোনটি?', a: 'সহিহ বুখারি সবচেয়ে বিশুদ্ধ হাদিসের কিতাব। ইমাম বুখারি (রহ.) প্রায় ছয় লাখ হাদিস পরীক্ষা করে ৭,২৭৫টি হাদিস এতে সংকলন করেছেন।' },
  { cat: 'হাদিস', q: '৪৪. কুতুবে সিত্তাহ কী?', a: 'কুতুবে সিত্তাহ মানে ছয়টি বিখ্যাত হাদিস গ্রন্থ। এগুলো হলো: সহিহ বুখারি, সহিহ মুসলিম, সুনানে আবু দাউদ, সুনানে তিরমিজি, সুনানে নাসাঈ ও সুনানে ইবনে মাজাহ।' },
  { cat: 'হাদিস', q: '৪৫. হাদিসে কুদসি কী?', a: 'হাদিসে কুদসি হলো সেই হাদিস যেখানে নবিজি (সা.) আল্লাহর বাণী বর্ণনা করেন, কিন্তু তা কুরআনের অংশ নয়। এর ভাষা আল্লাহর, বর্ণনা নবিজির।' },
  { cat: 'হাদিস', q: '৪৬. মুতাওয়াতির হাদিস কাকে বলে?', a: 'যে হাদিস এতো বেশি রাবি বর্ণনা করেছেন যে তাদের মিথ্যার উপর একমত হওয়া অসম্ভব — তাকে মুতাওয়াতির হাদিস বলে। এটি সর্বোচ্চ মর্যাদার হাদিস।' },
  { cat: 'হাদিস', q: '৪৭. হাদিসে চল্লিশা (আরবাঈন) কী?', a: 'ইমাম নববি (রহ.)-এর "আল-আরবাঈন আন-নওয়াবিয়্যাহ" হলো ৪২টি গুরুত্বপূর্ণ হাদিসের সংকলন যা প্রতিটি মুসলিমের জানা উচিত।' },
  { cat: 'হাদিস', q: '৪৮. ইমাম বুখারি (রহ.) কে ছিলেন?', a: 'ইমাম বুখারি (রহ.) ছিলেন বিখ্যাত হাদিস বিশেষজ্ঞ। তাঁর পুরো নাম আবু আব্দুল্লাহ মুহাম্মদ ইবনে ইসমাইল আল-বুখারি। তিনি ১৯৪ হিজরিতে বুখারায় জন্মগ্রহণ করেন।' },
  { cat: 'হাদিস', q: '৪৯. দুর্বল হাদিস দিয়ে আমল করা যাবে?', a: 'ফাজায়েলের ক্ষেত্রে দুর্বল হাদিস দিয়ে আমল করা যায় — অনেক আলেমের মত। তবে আকিদা ও হালাল-হারামের বিষয়ে শুধু সহিহ হাদিস ব্যবহার করতে হয়।' },
  { cat: 'হাদিস', q: '৫০. সনদ কী?', a: 'সনদ হলো হাদিসের বর্ণনাকারীদের শৃঙ্খল। যেমন: অমুক বলেছেন, তিনি অমুক থেকে শুনেছেন — এইভাবে নবিজি পর্যন্ত পৌঁছানো।' },

  // দোয়া
  { cat: 'দোয়া', q: '৫১. ঘুমানোর আগে কোন দোয়া পড়তে হয়?', a: '"আল্লাহুম্মা বিসমিকা আমুতু ওয়া আহইয়া।" অর্থ: হে আল্লাহ! তোমার নামে মরি এবং বাঁচি। এছাড়া আয়াতুল কুরসি পড়া সুন্নাত।' },
  { cat: 'দোয়া', q: '৫২. ঘুম থেকে উঠে কোন দোয়া পড়তে হয়?', a: '"আলহামদুলিল্লাহিল্লাজি আহইয়ানা বা\'দা মা আমাতানা ওয়া ইলাইহিন নুশুর।" অর্থ: সেই আল্লাহর প্রশংসা যিনি মৃত্যুর পর আমাদের জীবিত করলেন।' },
  { cat: 'দোয়া', q: '৫৩. খাবার খাওয়ার আগে কোন দোয়া পড়তে হয়?', a: 'খাবার আগে "বিসমিল্লাহ" বলতে হয়। ভুলে গেলে মাঝে মনে হলে বলতে হয়: "বিসমিল্লাহি আওয়ালাহু ওয়া আখিরাহ।"' },
  { cat: 'দোয়া', q: '৫৪. বাড়ি থেকে বের হওয়ার দোয়া কী?', a: '"বিসমিল্লাহি তাওয়াক্কালতু আলাল্লাহি ওয়ালা হাওলা ওয়ালা কুওয়াতা ইল্লা বিল্লাহ।" এই দোয়া পড়লে শয়তান দূরে থাকে।' },
  { cat: 'দোয়া', q: '৫৫. অজু শেষে কোন দোয়া পড়তে হয়?', a: '"আশহাদু আল লা ইলাহা ইল্লাল্লাহু ওয়াহদাহু লা শারিকালাহ ওয়া আশহাদু আন্না মুহাম্মাদান আবদুহু ওয়া রাসুলুহ।"' },
  { cat: 'দোয়া', q: '৫৬. সফরের দোয়া কী?', a: '"সুবহানাল্লাজি সাখখারা লানা হাজা ওয়ামা কুন্না লাহু মুকরিনিন ওয়া ইন্না ইলা রাব্বিনা লা-মুনকালিবুন।" বাহনে চড়ার সময় এই দোয়া পড়া সুন্নাত।' },
  { cat: 'দোয়া', q: '৫৭. বিপদে পড়লে কোন দোয়া পড়তে হয়?', a: '"ইন্না লিল্লাহি ওয়া ইন্না ইলাইহি রাজিউন।" (ইন্নালিল্লাহ) — এটি বিপদে পড়লে পড়তে হয়। এটি সূরা বাকারার ১৫৬ নম্বর আয়াত।' },
  { cat: 'দোয়া', q: '৫৮. ক্ষমা চাওয়ার শ্রেষ্ঠ দোয়া কী?', a: 'সাইয়িদুল ইস্তিগফার: "আল্লাহুম্মা আন্তা রাব্বি লা ইলাহা ইল্লা আন্তা, খালাকতানি ওয়া আনা আবদুকা..." — এটি ক্ষমা চাওয়ার শ্রেষ্ঠ দোয়া।' },
  { cat: 'দোয়া', q: '৫৯. দরুদ শরিফ কি এবং কেন পড়তে হয়?', a: 'দরুদ হলো নবিজির উপর আল্লাহর রহমত ও শান্তি চাওয়া। দরুদ পড়লে আল্লাহ ১০ গুণ রহমত বর্ষণ করেন এবং ১০টি গুনাহ মাফ করেন।' },
  { cat: 'দোয়া', q: '৬০. জুমার দিনে দোয়া কবুলের বিশেষ সময় কোনটি?', a: 'জুমার দিনে আসর থেকে মাগরিবের মধ্যবর্তী সময়ে দোয়া কবুল হয় বলে হাদিসে উল্লেখ রয়েছে। এই সময়টি অত্যন্ত মূল্যবান।' },

  // আখলাক
  { cat: 'আখলাক', q: '৬১. ইসলামে উত্তম চরিত্রের গুরুত্ব কী?', a: 'নবিজি (সা.) বলেছেন, "আমাকে পাঠানো হয়েছে উত্তম চরিত্র পূর্ণ করতে।" উত্তম চরিত্র মুমিনকে জান্নাতে নিকটে নিয়ে যায়।' },
  { cat: 'আখলাক', q: '৬২. মিথ্যা বলা কেন হারাম?', a: 'মিথ্যা সকল পাপের দরজা। নবিজি (সা.) বলেছেন মিথ্যাবাদী মুনাফিকের লক্ষণ। মিথ্যা বিশ্বাসকে নষ্ট করে, সম্পর্ক ভাঙে এবং সমাজে ফিতনা তৈরি করে।' },
  { cat: 'আখলাক', q: '৬৩. গিবত (পরনিন্দা) কী?', a: 'গিবত মানে কারো অনুপস্থিতিতে তার দোষ আলোচনা করা যা সে শুনলে কষ্ট পেত। কুরআনে এটিকে মৃত ভাইয়ের গোশত খাওয়ার সাথে তুলনা করা হয়েছে (সূরা হুজুরাত: ১২)।' },
  { cat: 'আখলাক', q: '৬৪. প্রতিবেশীর হক কী?', a: 'প্রতিবেশীকে কষ্ট না দেওয়া, তার প্রয়োজনে সাহায্য করা, তার সুখে-দুঃখে পাশে থাকা — এগুলো প্রতিবেশীর হক। নবিজি বলেছেন, প্রতিবেশীর হক না দিলে পূর্ণ মুমিন হওয়া যায় না।' },
  { cat: 'আখলাক', q: '৬৫. ক্রোধ নিয়ন্ত্রণের উপায় কী?', a: 'হাদিসে আছে রাগ হলে অজু করতে, দাঁড়িয়ে থাকলে বসতে, বসে থাকলে শুয়ে পড়তে। "আউজুবিল্লাহ" পড়া এবং চুপ থাকাও রাগ কমায়।' },
  { cat: 'আখলাক', q: '৬৬. বড়দের সম্মান করা কেন জরুরি?', a: 'নবিজি (সা.) বলেছেন, "যে ছোটদের স্নেহ করে না এবং বড়দের সম্মান করে না, সে আমাদের দলভুক্ত নয়।" বড়দের সম্মান ইসলামের একটি গুরুত্বপূর্ণ নির্দেশ।' },
  { cat: 'আখলাক', q: '৬৭. হাসিমুখে কথা বলার ফজিলত কী?', a: 'নবিজি (সা.) বলেছেন, "তোমার ভাইয়ের সামনে হাসিমুখে থাকা একটি সদকা।" হাসি মানুষের হৃদয় জয় করে এবং সম্পর্ক সুন্দর করে।' },
  { cat: 'আখলাক', q: '৬৮. সালামের গুরুত্ব কী?', a: '"আস-সালামু আলাইকুম" বলা সুন্নাত এবং শুনলে জবাব দেওয়া ওয়াজিব। সালামে দোয়া, ভালোবাসা ও শান্তি রয়েছে। সালাম দিলে গুনাহ মাফ হয় ও জান্নাতের নিশ্চয়তা পাওয়া যায়।' },
  { cat: 'আখলাক', q: '৬৯. অহংকার করা কেন নিষেধ?', a: 'নবিজি (সা.) বলেছেন, "যার অন্তরে সরিষার দানা পরিমাণ অহংকার আছে সে জান্নাতে যাবে না।" অহংকার শয়তানের গুণ এবং এটি মানুষকে ধ্বংস করে।' },
  { cat: 'আখলাক', q: '৭০. মাফ করে দেওয়ার ফজিলত কী?', a: 'কুরআনে বলা হয়েছে যারা ক্রোধ সংবরণ করে ও মানুষকে ক্ষমা করে দেয় — আল্লাহ তাদের ভালোবাসেন (সূরা আলে ইমরান: ১৩৪)। ক্ষমাকারীর মর্যাদা আল্লাহর কাছে বাড়ে।' },

  // ইতিহাস
  { cat: 'ইতিহাস', q: '৭১. ইসলামের প্রথম খলিফা কে ছিলেন?', a: 'হযরত আবু বকর সিদ্দিক (রা.) ইসলামের প্রথম খলিফা ছিলেন। তিনি ৬৩২ থেকে ৬৩৪ খ্রিস্টাব্দ পর্যন্ত খিলাফত পরিচালনা করেন।' },
  { cat: 'ইতিহাস', q: '৭২. মসজিদুল হারামের নির্মাণ কে করেছিলেন?', a: 'ইব্রাহিম (আ.) ও তাঁর পুত্র ইসমাইল (আ.) আল্লাহর নির্দেশে কাবা ঘর নির্মাণ করেছিলেন। তবে মূলত প্রথম কাবা নির্মাণ করেছিলেন ফেরেশতারা।' },
  { cat: 'ইতিহাস', q: '৭৩. হিজরি সন কত সালে শুরু হয়?', a: 'হিজরি সন শুরু হয় নবিজির (সা.) মদিনায় হিজরতের বছর থেকে অর্থাৎ ৬২২ খ্রিস্টাব্দ থেকে। এটি চালু করেন হযরত উমর (রা.)।' },
  { cat: 'ইতিহাস', q: '৭৪. বদর যুদ্ধ কত হিজরিতে হয়েছিল?', a: 'বদর যুদ্ধ ২য় হিজরিতে (৬২৪ খ্রিস্টাব্দ) হয়েছিল। মুসলিমরা ছিলেন ৩১৩ জন এবং কুরাইশ ছিল প্রায় ১০০০ জন। আল্লাহর সাহায্যে মুসলিমরা বিজয়ী হন।' },
  { cat: 'ইতিহাস', q: '৭৫. মক্কা বিজয় কত হিজরিতে?', a: 'মক্কা বিজয় হয়েছিল ৮ম হিজরির রমজান মাসে (৬৩০ খ্রিস্টাব্দ)। এই বিজয়ে প্রায় বিনা রক্তপাতে মক্কা বিজিত হয় এবং কাবা ঘর মূর্তিমুক্ত হয়।' },
  { cat: 'ইতিহাস', q: '৭৬. নবিজির (সা.) জন্ম কখন?', a: 'নবিজি মুহাম্মদ (সা.) আমুল ফিলের বছর (৫৭০ খ্রিস্টাব্দ) রবিউল আউয়াল মাসের ১২ তারিখ (বহুল মত) মক্কায় জন্মগ্রহণ করেন।' },
  { cat: 'ইতিহাস', q: '৭৭. নবিজি কত বছর বয়সে নবুওয়াত পেয়েছিলেন?', a: 'নবিজি (সা.) ৪০ বছর বয়সে নবুওয়াত প্রাপ্ত হন। প্রথম ওহি আসে হেরা গুহায় রমজান মাসে, যখন ফেরেশতা জিব্রাইল (আ.) আসেন।' },
  { cat: 'ইতিহাস', q: '৭৮. ইসলামের চার খলিফাকে কী বলা হয়?', a: 'চার খলিফাকে "খুলাফায়ে রাশেদিন" বলা হয়। তারা হলেন আবু বকর, উমর, উসমান ও আলি (রা.)। এই সময়কাল ছিল ইসলামের স্বর্ণযুগের সূচনা।' },
  { cat: 'ইতিহাস', q: '৭৯. কোন সাহাবি সবার আগে ইসলাম গ্রহণ করেছিলেন?', a: 'পুরুষদের মধ্যে সর্বপ্রথম হযরত আবু বকর (রা.), মহিলাদের মধ্যে হযরত খাদিজা (রা.) এবং শিশুদের মধ্যে হযরত আলি (রা.) ইসলাম গ্রহণ করেন।' },
  { cat: 'ইতিহাস', q: '৮০. আল-আকসা মসজিদ কোথায়?', a: 'মসজিদুল আকসা ফিলিস্তিনের জেরুজালেম (বায়তুল মাকদিস) শহরে অবস্থিত। এটি ইসলামের তৃতীয় পবিত্রতম স্থান এবং নবিজির মিরাজের স্থান।' },

  // মিশ্র
  { cat: 'আকিদা', q: '৮১. জান্নাতের দরজা কয়টি?', a: 'জান্নাতের দরজা ৮টি। প্রতিটি দরজার বিশেষ নাম আছে। নামাজের দরজা "বাবুস সালাহ", রোজার দরজা "বাবুর রাইয়ান" ইত্যাদি।' },
  { cat: 'আকিদা', q: '৮২. জাহান্নামের দরজা কয়টি?', a: 'জাহান্নামের দরজা ৭টি (সূরা হিজর: ৪৪)। প্রতিটি দরজার জন্য আলাদা দল নির্ধারিত রয়েছে।' },
  { cat: 'নামাজ', q: '৮৩. নামাজে সিজদায় কোন দোয়া পড়তে হয়?', a: '"সুবহানা রাব্বিয়াল আ\'লা।" অর্থ: আমার মহান প্রতিপালক পবিত্র। এটি তিনবার পড়া সুন্নাত। সিজদা হলো বান্দার আল্লাহর সবচেয়ে নিকটবর্তী অবস্থান।' },
  { cat: 'আখলাক', q: '৮৪. সত্যবাদিতার পুরস্কার কী?', a: 'নবিজি (সা.) বলেছেন সত্যবাদিতা মানুষকে নেকীর দিকে নিয়ে যায় এবং নেকী জান্নাতে নিয়ে যায়। সত্যবাদীকে আল্লাহর কাছে "সিদ্দিক" (মহাসত্যবাদী) লেখা হয়।' },
  { cat: 'দোয়া', q: '৮৫. মৃতের জন্য দোয়া কী?', a: 'মৃতের জন্য: "আল্লাহুম্মাগফিরলাহু ওয়ারহামহু ওয়া আফিহি ওয়া আফু আনহু।" অর্থ: হে আল্লাহ! তাকে ক্ষমা করো, দয়া করো, নিরাপদ রাখো এবং মাফ করো।' },
  { cat: 'কুরআন', q: '৮৬. কুরআনের শেষ সূরা কোনটি?', a: 'কুরআনের শেষ সূরা হলো সূরা নাস (১১৪ নম্বর সূরা)। এটি মক্কায় নাজিল হয়েছে এবং এতে মানুষের অন্তরে শয়তানের কুমন্ত্রণা থেকে আশ্রয় চাওয়া হয়েছে।' },
  { cat: 'নামাজ', q: '৮৭. আজানের জবাব কীভাবে দিতে হয়?', a: 'আজানের প্রতিটি বাক্যের মতো করে জবাব দিতে হয়। তবে "হাইয়া আলাস সালাহ" ও "হাইয়া আলাল ফালাহ" এর জবাবে বলতে হয়: "লা হাওলা ওয়ালা কুওয়াতা ইল্লা বিল্লাহ।"' },
  { cat: 'হাদিস', q: '৮৮. প্রতিটি কাজের শুরুতে কী পড়তে হয়?', a: '"বিসমিল্লাহ" পড়তে হয়। হাদিসে আছে, বিসমিল্লাহ ছাড়া কোনো গুরুত্বপূর্ণ কাজ শুরু করলে সেটি অসম্পূর্ণ থাকে।' },
  { cat: 'আখলাক', q: '৮৯. অপচয় কেন নিষেধ?', a: 'কুরআনে অপচয়কারীকে শয়তানের ভাই বলা হয়েছে (সূরা ইসরা: ২৭)। ইসলাম মিতব্যয়িতাকে উৎসাহিত করে এবং অপচয়কে হারাম করেছে।' },
  { cat: 'ইতিহাস', q: '৯০. কোন সাহাবি সবচেয়ে বেশি হাদিস বর্ণনা করেছেন?', a: 'হযরত আবু হুরায়রা (রা.) সবচেয়ে বেশি হাদিস বর্ণনা করেছেন — প্রায় ৫,৩৭৪টি হাদিস। তিনি নবিজির সাহচর্যে প্রায় ৩ বছর কাটিয়েছিলেন।' },
  { cat: 'আকিদা', q: '৯১. পৃথিবীতে কতজন নবী-রাসূল এসেছিলেন?', a: 'হাদিসে উল্লেখ আছে নবীর সংখ্যা ১ লাখ ২৪ হাজার এবং রাসূলের সংখ্যা ৩১৩ জন। কুরআনে ২৫ জন নবীর নাম উল্লেখ আছে।' },
  { cat: 'নামাজ', q: '৯২. ইমামের পেছনে নামাজ পড়লে কি আলাদা সওয়াব?', a: 'জামাতে নামাজ পড়লে একা পড়ার চেয়ে ২৭ গুণ বেশি সওয়াব। নবিজি জামাতে নামাজকে অত্যন্ত গুরুত্ব দিয়েছেন।' },

let currentCat = 'all';
let currentSearch = '';

function renderQA() {
  const container = document.getElementById('qaContainer');
  let filtered = qaData;

  if (currentCat !== 'all') {
    filtered = filtered.filter(item => item.cat === currentCat);
  }

  if (currentSearch.trim() !== '') {
    const s = currentSearch.toLowerCase();
    filtered = filtered.filter(item =>
      item.q.toLowerCase().includes(s) || item.a.toLowerCase().includes(s)
    );
  }

  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-result">😔 কোনো প্রশ্ন পাওয়া যায়নি।</div>';
    return;
  }

  // Group by category
  const groups = {};
  filtered.forEach((item, idx) => {
    if (!groups[item.cat]) groups[item.cat] = [];
    groups[item.cat].push({ ...item, idx });
  });

  let html = '';
  Object.keys(groups).forEach(cat => {
    html += `<div class="category-title">📌 ${cat}</div>`;
    groups[cat].forEach(item => {
      html += `
        <div class="accordion-item" data-cat="${item.cat}">
          <button class="accordion-header" onclick="toggle(this)">
            <span style="flex:1">${item.q}</span>
            <span class="arrow">▼</span>
          </button>
          <div class="accordion-body">${item.a}</div>
        </div>`;
    });
  });

  container.innerHTML = html;
}

function filterCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  // close all
  renderQA();
}

function filterQA() {
  currentSearch = document.getElementById('searchInput').value;
  renderQA();
}

function toggle(header) {
  const body = header.nextElementSibling;
  const isOpen = body.classList.contains('open');
  document.querySelectorAll('.accordion-body').forEach(b => b.classList.remove('open'));
  document.querySelectorAll('.accordion-header').forEach(h => h.classList.remove('active'));
  if (!isOpen) {
    body.classList.add('open');
    header.classList.add('active');
  }
}

renderQA();
</script>
